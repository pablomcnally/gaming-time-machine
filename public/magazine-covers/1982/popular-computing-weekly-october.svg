<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">Popular Computing Weekly October 1982 reconstructed cover image</title>
  <desc id="desc">A museum-style reconstructed magazine cover for Popular Computing Weekly, October 1982.</desc>
  <rect width="900" height="1200" fill="#e7efe7"/>
  <rect x="58" y="58" width="784" height="1084" fill="none" stroke="#14532d" stroke-width="8"/>
  <text x="82" y="160" fill="#14532d" font-family="Arial, sans-serif" font-size="50" font-weight="800">POPULAR</text>
  <text x="82" y="242" fill="#14532d" font-family="Arial, sans-serif" font-size="74" font-weight="800">COMPUTING</text>
  <text x="82" y="316" fill="#14532d" font-family="Arial, sans-serif" font-size="50" font-weight="800">WEEKLY</text>
  <text x="88" y="376" fill="#166534" font-family="Arial, sans-serif" font-size="30" letter-spacing="10">7 OCTOBER 1982</text>
  <rect x="132" y="470" width="636" height="392" fill="#14532d" fill-opacity="0.9"/>
  <text x="172" y="594" fill="#e7efe7" font-family="Arial, sans-serif" font-size="46" font-weight="700">SPECTRUM</text>
  <text x="172" y="674" fill="#bbf7d0" font-family="Arial, sans-serif" font-size="42" font-weight="700">DRAGON 32</text>
  <text x="172" y="752" fill="#e7efe7" font-family="Arial, sans-serif" font-size="33" letter-spacing="7">BBC MICRO</text>
  <text x="104" y="1054" fill="#14532d" font-family="Arial, sans-serif" font-size="34" letter-spacing="8">THE WEEKLY FEED</text>
  <text x="106" y="1104" fill="#166534" font-family="Arial, sans-serif" font-size="23" letter-spacing="5">RECONSTRUCTED COVER IMAGE</text>
</svg>
