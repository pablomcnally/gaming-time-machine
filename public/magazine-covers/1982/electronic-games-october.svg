<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">Electronic Games October 1982 reconstructed cover image</title>
  <desc id="desc">A museum-style reconstructed magazine cover for Electronic Games, October 1982.</desc>
  <rect width="900" height="1200" fill="#111827"/>
  <rect x="58" y="58" width="784" height="1084" fill="none" stroke="#fef3c7" stroke-width="8"/>
  <text x="76" y="170" fill="#fef3c7" font-family="Arial, sans-serif" font-size="76" font-weight="800" letter-spacing="4">ELECTRONIC</text>
  <text x="78" y="260" fill="#fef3c7" font-family="Arial, sans-serif" font-size="108" font-weight="800">GAMES</text>
  <text x="84" y="326" fill="#fca5a5" font-family="Arial, sans-serif" font-size="32" letter-spacing="12">OCTOBER 1982</text>
  <rect x="124" y="420" width="652" height="356" fill="#fef3c7" fill-opacity="0.1" stroke="#fef3c7" stroke-width="4"/>
