  <path d="M642 596h76M680 558v76" stroke="#111827" stroke-width="14"/>
  <text x="104" y="1054" fill="#fef3c7" font-family="Arial, sans-serif" font-size="32" letter-spacing="7">ARCADE FUTURE ON PAPER</text>
  <text x="106" y="1104" fill="#fca5a5" font-family="Arial, sans-serif" font-size="23" letter-spacing="5">RECONSTRUCTED COVER IMAGE</text>
