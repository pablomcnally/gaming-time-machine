  <title id="title">Reconstructed Computer and Video Games 1983 cover</title>
  <desc id="desc">A reconstructed C&amp;VG-style cover for Gaming Time Machine exhibits.</desc>
  <rect width="900" height="1200" fill="#eee4cf"/>
  <rect x="0" y="0" width="900" height="190" fill="#d62828"/>
  <text x="48" y="78" font-family="Arial Black, Arial, sans-serif" font-size="50" fill="#fff">COMPUTER</text>
  <text x="48" y="148" font-family="Arial Black, Arial, sans-serif" font-size="64" fill="#fff">&amp; VIDEO GAMES</text>
  <rect x="70" y="246" width="760" height="560" fill="#0f172a" stroke="#111" stroke-width="10"/>
  <g fill="none" stroke="#facc15" stroke-width="12">
