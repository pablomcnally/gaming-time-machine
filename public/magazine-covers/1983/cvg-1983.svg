  <text x="92" y="1030" font-family="Courier New, monospace" font-size="30" fill="#111">Listings, cassettes, cabinets, high street rumours.</text>
  <text x="92" y="1090" font-family="Courier New, monospace" font-size="24" fill="#d62828">Reconstructed exhibit cover</text>
