<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">Reconstructed Electronic Games 1983 cover</title>
  <desc id="desc">A museum-style reconstructed magazine cover inspired by early 1983 videogame magazines.</desc>
  <rect width="900" height="1200" fill="#121212"/>
  <rect x="48" y="48" width="804" height="1104" fill="#f7ecd2" stroke="#f14b32" stroke-width="18"/>
  <text x="94" y="158" font-family="Arial Black, Arial, sans-serif" font-size="82" fill="#111">electronic</text>
  <text x="94" y="246" font-family="Arial Black, Arial, sans-serif" font-size="94" fill="#f14b32">GAMES</text>
  <rect x="94" y="300" width="712" height="484" fill="#1d2b53"/>
  <path d="M160 650 L450 390 L740 650 Z" fill="#f7d154" opacity=".95"/>
  <circle cx="450" cy="520" r="72" fill="#f14b32"/>
  <rect x="180" y="846" width="540" height="54" fill="#111"/>
  <text x="450" y="884" text-anchor="middle" font-family="Courier New, monospace" font-size="30" fill="#f7ecd2">1983 ARCADE REPORT</text>
  <text x="116" y="982" font-family="Courier New, monospace" font-size="32" fill="#111">Crash signals. Laserdiscs. Home computers.</text>
  <text x="116" y="1044" font-family="Courier New, monospace" font-size="28" fill="#f14b32">Reconstructed exhibit cover</text>
</svg>
