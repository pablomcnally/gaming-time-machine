  <text x="104" y="1036" fill="#18181b" font-family="Arial, sans-serif" font-size="38" letter-spacing="7">THE WAITING ROOM</text>
  <text x="106" y="1088" fill="#57534e" font-family="Arial, sans-serif" font-size="23" letter-spacing="5">RECONSTRUCTED COVER IMAGE</text>
