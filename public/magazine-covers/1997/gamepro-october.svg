  <path d="M168 846 C260 742 392 742 480 846 C568 950 700 950 782 846" fill="none" stroke="#fde68a" stroke-width="28" stroke-linecap="round"/>
  <circle cx="236" cy="848" r="44" fill="#fff7ed"/>
