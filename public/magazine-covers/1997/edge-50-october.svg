<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">Edge issue 50 reconstructed cover image</title>
  <desc id="desc">A museum-style reconstructed magazine cover image for Edge issue 50, October 1997.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e7efe7"/>
      <stop offset="0.48" stop-color="#18181b"/>
      <stop offset="1" stop-color="#fbf8ef"/>
    </linearGradient>
    <pattern id="ticks" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M28 0v56M0 28h56" stroke="#ffffff" stroke-opacity="0.12" stroke-width="3"/>
    </pattern>
  </defs>
  <rect width="900" height="1200" fill="url(#bg)"/>
  <rect width="900" height="1200" fill="url(#ticks)"/>
  <rect x="62" y="62" width="776" height="1076" fill="none" stroke="#fbf8ef" stroke-width="8"/>
  <text x="86" y="210" fill="#fbf8ef" font-family="Arial, sans-serif" font-size="172" font-weight="800" letter-spacing="-6">edge</text>
  <text x="96" y="282" fill="#d6d3d1" font-family="Arial, sans-serif" font-size="34" letter-spacing="13">ISSUE 50  OCTOBER 1997</text>
  <rect x="112" y="398" width="676" height="388" fill="#fbf8ef" fill-opacity="0.1" stroke="#fbf8ef" stroke-width="4"/>
  <text x="148" y="492" fill="#fbf8ef" font-family="Arial, sans-serif" font-size="46" font-weight="700">GTA</text>
  <text x="148" y="578" fill="#fbf8ef" font-family="Arial, sans-serif" font-size="46" font-weight="700">ZELDA 64</text>
  <text x="148" y="664" fill="#fbf8ef" font-family="Arial, sans-serif" font-size="46" font-weight="700">TOMB RAIDER 2</text>
  <text x="148" y="738" fill="#d6d3d1" font-family="Arial, sans-serif" font-size="30" letter-spacing="7">PRE-SCREEN + CD-ROM</text>
  <circle cx="674" cy="596" r="86" fill="#b91c1c" fill-opacity="0.78"/>
  <text x="104" y="1038" fill="#fbf8ef" font-family="Arial, sans-serif" font-size="38" letter-spacing="7">THE KIOSK AS PORTAL</text>
  <text x="106" y="1090" fill="#d6d3d1" font-family="Arial, sans-serif" font-size="23" letter-spacing="5">RECONSTRUCTED COVER IMAGE</text>
</svg>
